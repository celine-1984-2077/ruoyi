site_name: RuoYi Docs Mirror
site_description: Mirror of doc.iocoder.cn for local search and GitHub Pages hosting
site_url: https://tony1120.github.io/ruoyi/
repo_url: https://github.com/Tony1120/ruoyi
repo_name: Tony1120/ruoyi
docs_dir: docs/iocoder-docs
site_dir: site
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue grey
      accent: indigo

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social: []

extra_css:
  - stylesheets/docs.css

